<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Health Monitor - Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Auth0 SPA JS SDK -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="plant-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22V12"/>
        <path d="M5 12C5 7 8 3 12 3s7 4 7 9"/>
        <path d="M12 12C10 8 6 6 2 7"/>
        <path d="M12 12c2-4 6-6 10-5"/>
      </svg>
    </div>
    <h1>Plant Health Monitor</h1>
    <p class="login-subtitle">Protect and analyze your plants with Gemini AI.</p>
    
    <div id="auth0-login-container" style="text-align: center; margin-top: 2rem;">
      <button id="auth0-login-btn" class="primary-btn login-btn">Log In securely with Auth0</button>
    </div>
    
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
      const client = await initAuth();
      if (!client) {
          console.error("Auth0 client failed to initialize.");
          return;
      }
      
      const isAuthenticated = await client.isAuthenticated();
      
      if (isAuthenticated) {
          window.location.replace("/dashboard");
      } else {
          document.getElementById("auth0-login-btn").addEventListener("click", async () => {
              await client.loginWithRedirect({
                  authorizationParams: {
                      prompt: "login"
                  }
              });
          });
      }
  });
</script>
</body>
</html>
