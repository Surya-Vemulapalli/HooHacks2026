services:
  web:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - web